<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產量管理系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F7F5F0;--surface:#FFF;--surface2:#F0EDE6;--border:#DDD9CE;
  --text:#2C2C2C;--text2:#6B6560;
  --bake:#C8824A;--bake-l:#F5E8D8;
  --dessert:#7B5EA7;--dessert-l:#EAD8F5;
  --WX:#4A8BC8;--FJ:#C84A8B;--SJ:#3AAA8A;--DZ:#C8A030;
  --WX-l:#D8EAF5;--FJ-l:#F5D8EA;--SJ-l:#D8F5EE;--DZ-l:#F5EDD0;
  --shadow:0 2px 12px rgba(0,0,0,.07);--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:stretch;position:sticky;top:0;z-index:200;box-shadow:var(--shadow)}
.nav-brand{font-size:15px;font-weight:800;padding:0 16px 0 4px;margin-right:8px;border-right:1px solid var(--border);display:flex;align-items:center;white-space:nowrap}
.nav-brand em{color:var(--bake);font-style:normal}
.nav-tabs{display:flex;overflow-x:auto}
.nav-tab{padding:0 16px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;height:52px}
.nav-tab:hover{color:var(--text);background:var(--surface2)}
.nav-tab.active{color:var(--bake);border-bottom-color:var(--bake)}
.page{display:none;padding:20px 16px;max-width:1200px;margin:0 auto}
.page.active{display:block}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.ph h2{font-size:18px;font-weight:800}
.filters{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;box-shadow:var(--shadow)}
.fg{display:flex;align-items:center;gap:6px}
.fl{font-size:11px;color:var(--text2);font-weight:700;white-space:nowrap}
select,input[type=date],input[type=text],input[type=number]{border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
select:focus,input:focus{border-color:var(--bake)}
.btn{padding:7px 14px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px}
.btn:active{opacity:.75}
.btn-bake{background:var(--bake);color:#fff}
.btn-dessert{background:var(--dessert);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{background:var(--surface2);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);border-left:4px solid var(--border)}
.c-bake{border-left-color:var(--bake)!important}.c-dessert{border-left-color:var(--dessert)!important}
.c-WX{border-left-color:var(--WX)!important}.c-FJ{border-left-color:var(--FJ)!important}
.c-SJ{border-left-color:var(--SJ)!important}.c-DZ{border-left-color:var(--DZ)!important}
.sc-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sc-value{font-size:26px;font-weight:800}
.sc-sub{font-size:12px;color:var(--text2);margin-top:2px}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:14px;margin-bottom:16px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.chart-title{font-size:13px;font-weight:700;margin-bottom:12px}
.chart-wrap{position:relative;height:220px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px}
.card-hd{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface2)}
.card-hd-title{font-size:13px;font-weight:700}
.card-body{padding:16px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:9px 12px;text-align:left;font-weight:700;color:var(--text2);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;font-size:11px;text-transform:uppercase}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg)}
tbody td{padding:8px 12px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.b-bake{background:var(--bake-l);color:var(--bake)}.b-dessert{background:var(--dessert-l);color:var(--dessert)}
.b-WX{background:var(--WX-l);color:var(--WX)}.b-FJ{background:var(--FJ-l);color:var(--FJ)}
.b-SJ{background:var(--SJ-l);color:var(--SJ)}.b-DZ{background:var(--DZ-l);color:var(--DZ)}
.b-new{background:#E8F5E9;color:#2E7D32}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;font-weight:700;color:var(--text2)}
.form-group select,.form-group input{width:100%}
.qty-section{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.qs-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px}
.qty-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.qi label{font-size:12px;font-weight:800;display:block;margin-bottom:4px}
.qi input{width:100%;text-align:center}
.pag{display:flex;align-items:center;gap:6px;padding:10px 14px;border-top:1px solid var(--border);flex-wrap:wrap}
.pag-btn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:12px;cursor:pointer;font-family:inherit}
.pag-btn:hover{background:var(--surface2)}
.pag-btn.active{background:var(--bake);border-color:var(--bake);color:#fff}
.pag-info{font-size:12px;color:var(--text2)}
.toast{position:fixed;bottom:20px;right:20px;background:#2C2C2C;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:#2E7D32}.toast.err{background:#C0392B}
.t-到貨{color:#4A8BC8}.t-餘量{color:#C87840}.t-實際產量{color:#3A7D44}.t-品管損耗{color:#C8404A}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:12px;background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.tag-del{cursor:pointer;color:var(--text2);font-size:15px;line-height:1;margin-left:2px}
.tag-del:hover{color:#C0392B}
.tag-new{background:var(--dessert-l);border-color:var(--dessert);color:var(--dessert)}
.empty{text-align:center;padding:36px;color:var(--text2)}
.empty .ei{font-size:36px;margin-bottom:8px}
.text-muted{color:var(--text2)}.text-sm{font-size:12px}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:13px;padding:2px 6px;border-radius:4px}
.del-btn:hover{color:#C0392B;background:#FEE}
.status-bar{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px;margin-bottom:16px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#3A7D44;flex-shrink:0}
.status-dot.loading{background:var(--bake);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:600px){
  .chart-grid{grid-template-columns:1fr}
  .qty-grid{grid-template-columns:repeat(2,1fr)}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-brand">🥐 <em>產量</em>管理</div>
  <div class="nav-tabs">
    <div class="nav-tab active" id="tab-overview" onclick="switchTab('overview')">📊 儀表板</div>
    <div class="nav-tab" id="tab-data" onclick="switchTab('data')">🔍 查看紀錄</div>
    <div class="nav-tab" id="tab-add" onclick="switchTab('add')">➕ 新增紀錄</div>
    <div class="nav-tab" id="tab-manage" onclick="switchTab('manage')">⚙️ 品項管理</div>
    <div class="nav-tab" id="tab-export" onclick="switchTab('export')">⬇ 匯出報表</div>
  </div>
</div>

<div class="page active" id="page-overview">
  <div class="ph">
    <h2>儀表板</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <div class="fg"><span class="fl">月份</span><select id="ov-month" onchange="renderOverview()"><option value="">全部</option></select></div>
      <div class="fg"><span class="fl">部門</span><select id="ov-dept" onchange="renderOverview()"><option value="">全部</option><option value="烘焙">烘焙</option><option value="甜點">甜點</option></select></div>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">就緒</span>
  </div>
  <div class="stat-row" id="ov-stats"></div>
  <div class="chart-grid">
    <div class="chart-card"><div class="chart-title">各店實際產量月趨勢</div><div class="chart-wrap"><canvas id="c-trend"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">各店產量佔比</div><div class="chart-wrap"><canvas id="c-pie"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">烘焙 Top 10 品項</div><div class="chart-wrap"><canvas id="c-bake-top"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">甜點 Top 10 品項</div><div class="chart-wrap"><canvas id="c-dessert-top"></canvas></div></div>
  </div>
</div>

<div class="page" id="page-data">
  <div class="ph"><h2>查看紀錄</h2></div>
  <div class="filters">
    <div class="fg"><span class="fl">月份</span><select id="f-month" onchange="renderTable()"><option value="">全部</option></select></div>
    <div class="fg"><span class="fl">部門</span><select id="f-dept" onchange="onDeptChange('f-product');renderTable()"><option value="">全部</option><option value="烘焙">烘焙</option><option value="甜點">甜點</option></select></div>
    <div class="fg"><span class="fl">店別</span><select id="f-store" onchange="renderTable()"><option value="">全部</option><option value="WX">WX</option><option value="FJ">FJ</option><option value="SJ">SJ</option><option value="DZ">DZ</option></select></div>
    <div class="fg"><span class="fl">品項</span><select id="f-product" onchange="renderTable()"><option value="">全部</option></select></div>
    <div class="fg"><span class="fl">類型</span><select id="f-type" onchange="renderTable()"><option value="">全部</option><option value="實際產量">實際產量</option><option value="到貨">到貨</option><option value="餘量">餘量</option><option value="品管損耗">品管損耗</option></select></div>
    <button class="btn btn-outline btn-sm" onclick="resetFilters()">重設</button>
  </div>
  <div class="card">
    <div class="card-hd">
      <div class="card-hd-title" id="table-count">—</div>
      <button class="btn btn-outline btn-sm" onclick="exportCurrentCSV()">⬇ CSV</button>
    </div>
    <div class="tw"><table>
      <thead><tr><th>日期</th><th>部門</th><th>品項</th><th>類型</th><th>WX</th><th>FJ</th><th>SJ</th><th>DZ</th><th>合計</th><th></th></tr></thead>
      <tbody id="table-body"></tbody>
    </table></div>
    <div class="pag" id="pagination"></div>
  </div>
</div>

<div class="page" id="page-add">
  <div class="ph"><h2>新增紀錄</h2></div>
  <div class="card">
    <div class="card-hd"><div class="card-hd-title">📝 逐日填入</div></div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-group"><label>日期 *</label><input type="date" id="add-date"></div>
        <div class="form-group"><label>部門 *</label><select id="add-dept" onchange="onDeptChange('add-product')"><option value="">請選擇</option><option value="烘焙">烘焙</option><option value="甜點">甜點</option></select></div>
        <div class="form-group"><label>品項 *</label><select id="add-product"><option value="">先選部門</option></select></div>
      </div>
      <div class="qty-section"><div class="qs-title">到貨數量</div><div class="qty-grid">
        <div class="qi"><label style="color:var(--WX)">WX</label><input type="number" id="a-到貨-WX" placeholder="0" min="0"></div>
        <div class="qi"><label style="color:var(--FJ)">FJ</label><input type="number" id="a-到貨-FJ" placeholder="0" min="0"></div>
        <div class="qi"><label style="color:var(--SJ)">SJ</label><input type="number" id="a-到貨-SJ" placeholder="0" min="0"></div>
        <div class="qi"><label style="color:var(--DZ)">DZ</label><input type="number" id="a-到貨-DZ" placeholder="0" min="0"></div>
      </div></div>
      <div class="qty-section"><div class="qs-title">餘量</div><div class="qty-grid">
        <div class="qi"><label style="color:var(--WX)">WX</label><input type="number" id="a-餘量-WX" placeholder="0" min="0"></div>
        <div class="qi"><label style="color:var(--FJ)">FJ</label><input type="number" id="a-餘量-FJ" placeholder="0" min="0"></div>
        <div class="qi"><label style="color:var(--SJ)">SJ</label><input type="number" id="a-餘量-SJ" placeholder="0" min="0"></div>
        <div class="qi"><label style="color:var(--DZ)">DZ</label><input type="number" id="a-餘量-DZ" placeholder="0" min="0"></div>
      </div></div>
      <div class="qty-section"><div class="qs-title">實際產量</div><div class="qty-grid">
        <div class="qi"><label style="color:var(--WX)">WX</label><input type="number" id="a-實際產量-WX" placeholder="0" min="0"></div>
        <div class="qi"><label style="color:var(--FJ)">FJ</label><input type="number" id="a-實際產量-FJ" placeholder="0" min="0"></div>
        <div class="qi"><label style="color:var(--SJ)">SJ</label><input type="number" id="a-實際產量-SJ" placeholder="0" min="0"></div>
        <div class="qi"><label style="color:var(--DZ)">DZ</label><input type="number" id="a-實際產量-DZ" placeholder="0" min="0"></div>
      </div></div>
      <div class="qty-section"><div class="qs-title">品管損耗</div><div class="qty-grid">
        <div class="qi"><label style="color:var(--WX)">WX</label><input type="number" id="a-品管損耗-WX" placeholder="0" min="0"></div>
        <div class="qi"><label style="color:var(--FJ)">FJ</label><input type="number" id="a-品管損耗-FJ" placeholder="0" min="0"></div>
        <div class="qi"><label style="color:var(--SJ)">SJ</label><input type="number" id="a-品管損耗-SJ" placeholder="0" min="0"></div>
        <div class="qi"><label style="color:var(--DZ)">DZ</label><input type="number" id="a-品管損耗-DZ" placeholder="0" min="0"></div>
      </div></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-bake" onclick="saveRecord()">✓ 儲存紀錄</button>
        <button class="btn btn-outline" onclick="clearAddForm()">清除</button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-hd">
      <div class="card-hd-title">📅 批次輸入整月紀錄</div>
      <button class="btn btn-outline btn-sm" id="batch-toggle-btn" onclick="toggleBatch()">展開</button>
    </div>
    <div id="batch-section" style="display:none" class="card-body">
      <div class="form-grid">
        <div class="form-group"><label>年份</label><select id="b-year" onchange="renderBatchCal()"><option value="2026">2026</option><option value="2027">2027</option><option value="2028">2028</option></select></div>
        <div class="form-group"><label>月份</label><select id="b-month" onchange="renderBatchCal()">
          <option value="01">1月</option><option value="02">2月</option><option value="03">3月</option><option value="04">4月</option><option value="05">5月</option><option value="06">6月</option><option value="07">7月</option><option value="08">8月</option><option value="09">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
        </select></div>
        <div class="form-group"><label>部門</label><select id="b-dept" onchange="onDeptChange('b-product');renderBatchCal()"><option value="">請選擇</option><option value="烘焙">烘焙</option><option value="甜點">甜點</option></select></div>
        <div class="form-group"><label>品項</label><select id="b-product" onchange="renderBatchCal()"><option value="">先選部門</option></select></div>
        <div class="form-group"><label>類型</label><select id="b-type" onchange="renderBatchCal()"><option value="實際產量">實際產量</option><option value="到貨">到貨</option><option value="餘量">餘量</option><option value="品管損耗">品管損耗</option></select></div>
      </div>
      <div id="batch-calendar"></div>
      <button class="btn btn-bake" style="margin-top:12px" onclick="saveBatch()">✓ 批次儲存</button>
    </div>
  </div>
</div>

<div class="page" id="page-manage">
  <div class="ph"><h2>品項管理</h2></div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:14px">
    <div class="card">
      <div class="card-hd"><div class="card-hd-title">🥐 烘焙品項</div><span class="text-muted text-sm" id="bake-count"></span></div>
      <div class="card-body">
        <div id="bake-tags" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px"></div>
        <div style="display:flex;gap:8px">
          <input type="text" id="new-bake" placeholder="輸入新品項名稱" style="flex:1">
          <button class="btn btn-bake btn-sm" onclick="addProduct('烘焙')">+ 新增</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-hd"><div class="card-hd-title">🍰 甜點品項</div><span class="text-muted text-sm" id="dessert-count"></span></div>
      <div class="card-body">
        <div id="dessert-tags" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px"></div>
        <div style="display:flex;gap:8px">
          <input type="text" id="new-dessert" placeholder="輸入新品項名稱" style="flex:1">
          <button class="btn btn-dessert btn-sm" onclick="addProduct('甜點')">+ 新增</button>
        </div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-hd"><div class="card-hd-title">💾 資料管理</div></div>
    <div class="card-body">
      <div id="storage-info" class="text-muted text-sm" style="margin-bottom:12px"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" onclick="exportBackup()">⬇ 備份新增資料 JSON</button>
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('imp-file').click()">⬆ 匯入備份</button>
        <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importBackup(event)">
      </div>
    </div>
  </div>
</div>

<div class="page" id="page-export">
  <div class="ph"><h2>匯出報表</h2></div>
  <div class="card">
    <div class="card-hd"><div class="card-hd-title">設定匯出條件</div></div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-group"><label>月份</label><select id="exp-month"><option value="">全部</option></select></div>
        <div class="form-group"><label>部門</label><select id="exp-dept"><option value="">全部</option><option value="烘焙">烘焙</option><option value="甜點">甜點</option></select></div>
        <div class="form-group"><label>店別</label><select id="exp-store"><option value="">全部</option><option value="WX">WX</option><option value="FJ">FJ</option><option value="SJ">SJ</option><option value="DZ">DZ</option></select></div>
        <div class="form-group"><label>類型</label><select id="exp-type"><option value="">全部</option><option value="實際產量">實際產量</option><option value="到貨">到貨</option><option value="餘量">餘量</option><option value="品管損耗">品管損耗</option></select></div>

function saveUD(){try{localStorage.setItem('prod_rec',JSON.stringify(USER_DATA));}catch(e){toast('儲存空間不足','err');}}
function loadUD(){try{var r=localStorage.getItem('prod_rec');return r?JSON.parse(r):[]; }catch(e){return [];}}
function saveProd(){localStorage.setItem('prod_items',JSON.stringify(PRODUCTS));}
function loadProd(){
  try{
    var r=localStorage.getItem('prod_items');
    var bs={},ds={};
    DEFAULT_BAKE.forEach(function(x){bs[x]=1;});
    DEFAULT_DESSERT.forEach(function(x){ds[x]=1;});
    if(r){var p=JSON.parse(r);(p['烘焙']||[]).forEach(function(x){bs[x]=1;});(p['甜點']||[]).forEach(function(x){ds[x]=1;});}
    PRODUCTS['烘焙']=Object.keys(bs);
    PRODUCTS['甜點']=Object.keys(ds);
  }catch(e){PRODUCTS['烘焙']=DEFAULT_BAKE.slice();PRODUCTS['甜點']=DEFAULT_DESSERT.slice();}
}

function init(){
  USER_DATA=loadUD();
  loadProd();
  fillMonthSelects();
  fillProductSelect('f-product','');
  renderOverview();
  renderTable();
  renderManage();
  document.getElementById('add-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('status-text').textContent='內嵌資料 '+BASE_DATA.length.toLocaleString()+' 筆　本機新增 '+USER_DATA.length+' 筆';
  document.getElementById('new-bake').addEventListener('keydown',function(e){if(e.key==='Enter')addProduct('烘焙');});
  document.getElementById('new-dessert').addEventListener('keydown',function(e){if(e.key==='Enter')addProduct('甜點');});
}

function allData(){return BASE_DATA.concat(USER_DATA);}
function getMonths(){var s={};allData().forEach(function(r){s[r.date.slice(0,7)]=1;});return Object.keys(s).sort();}

function fillMonthSelects(){
  var months=getMonths();
  ['ov-month','f-month','exp-month','prev-month'].forEach(function(id){
    var el=document.getElementById(id),cur=el.value;
    while(el.options.length>1)el.remove(1);
    months.forEach(function(m){var o=new Option(m,m);if(m===cur)o.selected=true;el.add(o);});
  });
}

function fillProductSelect(selectId,dept){
  var el=document.getElementById(selectId),cur=el.value;
  var isAdd=(selectId==='add-product'||selectId==='b-product');
  el.innerHTML='<option value="">'+(isAdd?'請選擇品項':'全部品項')+'</option>';
  var prods;
  if(dept==='烘焙')prods=PRODUCTS['烘焙'].slice();
  else if(dept==='甜點')prods=PRODUCTS['甜點'].slice();
  else{var all={};PRODUCTS['烘焙'].forEach(function(p){all[p]=1;});PRODUCTS['甜點'].forEach(function(p){all[p]=1;});prods=Object.keys(all);}
  prods.sort().forEach(function(p){var o=new Option(p,p);if(p===cur)o.selected=true;el.add(o);});
}

function onDeptChange(t){
  var s=t==='f-product'?'f-dept':t==='add-product'?'add-dept':'b-dept';
  fillProductSelect(t,document.getElementById(s).value);
}

function switchTab(tab){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='export')renderSummaryPreview();
}

function filtered(month,dept,store,product,type){
  return allData().filter(function(r){
    if(month&&r.date.indexOf(month)!==0)return false;
    if(dept&&r.dept!==dept)return false;
    if(store&&r.store!==store)return false;
    if(product&&r.product!==product)return false;
    if(type&&r.type!==type)return false;
    return true;
  });
}

function grouped(recs){
  var map={};
  recs.forEach(function(r){
    var k=r.date+'|'+r.dept+'|'+r.product+'|'+r.type;
    if(!map[k])map[k]={date:r.date,dept:r.dept,product:r.product,type:r.type,WX:null,FJ:null,SJ:null,DZ:null,_new:false};
    map[k][r.store]=(map[k][r.store]||0)+r.value;
    if(r._new)map[k]._new=true;
  });
  return Object.values(map).sort(function(a,b){return b.date.localeCompare(a.date)||a.product.localeCompare(b.product);});
}

function sumByStore(recs){
  var o={WX:0,FJ:0,SJ:0,DZ:0};
  recs.forEach(function(r){o[r.store]=(o[r.store]||0)+r.value;});
  return o;
}

function css(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

function renderOverview(){
  var month=document.getElementById('ov-month').value;
  var dept=document.getElementById('ov-dept').value;
  var prod=filtered(month,dept,'','','實際產量');
  var ss=sumByStore(prod);
  var total=STORES.reduce(function(a,s){return a+ss[s];},0);
  document.getElementById('ov-stats').innerHTML=
    '<div class="stat-card c-bake"><div class="sc-label">總實際產量</div><div class="sc-value">'+total.toLocaleString()+'</div><div class="sc-sub">所有店別合計</div></div>'+
    STORES.map(function(s){return '<div class="stat-card c-'+s+'"><div class="sc-label">'+s+'</div><div class="sc-value">'+ss[s].toLocaleString()+'</div><div class="sc-sub">'+(total?(ss[s]/total*100).toFixed(1)+'%':'—')+'</div></div>';}).join('');
  renderTrend(dept);renderPie(ss);
  renderTopBar('c-bake-top',month,'烘焙');
  renderTopBar('c-dessert-top',month,'甜點');
}

function dChart(k){if(chartInst[k]){chartInst[k].destroy();delete chartInst[k];}}

function renderTrend(dept){
  dChart('trend');
  var months=getMonths();
  chartInst['trend']=new Chart(document.getElementById('c-trend'),{
    type:'line',
    data:{labels:months,datasets:STORES.map(function(s){return {label:s,data:months.map(function(m){return filtered(m,dept||'',s,'','實際產量').reduce(function(a,r){return a+r.value;},0);}),borderColor:css('--'+s),backgroundColor:css('--'+s+'-l'),tension:.3,fill:false,pointRadius:4};})},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11}}}},scales:{y:{beginAtZero:true,grid:{color:'#EEE'}},x:{grid:{display:false}}}}
  });
}

function renderPie(ss){
  dChart('pie');
  chartInst['pie']=new Chart(document.getElementById('c-pie'),{
    type:'doughnut',
    data:{labels:STORES,datasets:[{data:STORES.map(function(s){return ss[s];}),backgroundColor:STORES.map(function(s){return css('--'+s);}),borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}
  });
}

function renderTopBar(id,month,dept){
  dChart(id);
  var recs=filtered(month,dept,'','','實際產量');
  var byP={};
  recs.forEach(function(r){byP[r.product]=(byP[r.product]||0)+r.value;});
  var sorted=Object.entries(byP).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var color=dept==='烘焙'?'#C8824A':'#7B5EA7';
  var light=dept==='烘焙'?'rgba(200,130,74,.15)':'rgba(123,94,167,.15)';
  chartInst[id]=new Chart(document.getElementById(id),{
    type:'bar',
    data:{labels:sorted.map(function(x){return x[0];}),datasets:[{label:'實際產量',data:sorted.map(function(x){return x[1];}),backgroundColor:light,borderColor:color,borderWidth:2}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,grid:{color:'#EEE'}},y:{grid:{display:false},ticks:{font:{size:11}}}}}
  });
}

function renderTable(){
  var recs=filtered(document.getElementById('f-month').value,document.getElementById('f-dept').value,document.getElementById('f-store').value,document.getElementById('f-product').value,document.getElementById('f-type').value);
  var rows=grouped(recs);
  document.getElementById('table-count').textContent='共 '+rows.length.toLocaleString()+' 筆';
  var tp=Math.max(1,Math.ceil(rows.length/PER_PAGE));
  curPage=Math.min(curPage,tp);
  var pageRows=rows.slice((curPage-1)*PER_PAGE,curPage*PER_PAGE);
  var tbody=document.getElementById('table-body');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="10"><div class="empty"><div class="ei">🔍</div><div>沒有符合條件的紀錄</div></div></td></tr>';}
  else{
    tbody.innerHTML=pageRows.map(function(r){
      var total=(r.WX||0)+(r.FJ||0)+(r.SJ||0)+(r.DZ||0);
      var nb=r._new?'<span class="badge b-new" style="margin-left:4px">新</span>':'';
      var db=r._new?'<button class="del-btn" onclick="deleteRow(\''+r.date+'\',\''+r.dept+'\',\''+r.product+'\',\''+r.type+'\')">✕</button>':'';
      return '<tr><td>'+r.date+'</td><td><span class="badge b-'+(r.dept==='烘焙'?'bake':'dessert')+'">'+r.dept+'</span></td><td>'+r.product+nb+'</td><td><span class="t-'+r.type+'">'+r.type+'</span></td><td>'+(r.WX!=null?r.WX:'—')+'</td><td>'+(r.FJ!=null?r.FJ:'—')+'</td><td>'+(r.SJ!=null?r.SJ:'—')+'</td><td>'+(r.DZ!=null?r.DZ:'—')+'</td><td><strong>'+total+'</strong></td><td>'+db+'</td></tr>';
    }).join('');
  }
  renderPag(tp,rows.length);
}

function renderPag(tp,total){
  var pag=document.getElementById('pagination');
  if(tp<=1){pag.innerHTML='<span class="pag-info">共 '+total+' 筆</span>';return;}
  var h='<span class="pag-info">共 '+total+' 筆 | '+curPage+'/'+tp+' 頁</span>';
  if(curPage>1)h+='<button class="pag-btn" onclick="goPage('+(curPage-1)+')">←</button>';
  for(var p=Math.max(1,curPage-2);p<=Math.min(tp,curPage+2);p++)h+='<button class="pag-btn'+(p===curPage?' active':'')+'" onclick="goPage('+p+')">'+p+'</button>';
  if(curPage<tp)h+='<button class="pag-btn" onclick="goPage('+(curPage+1)+')">→</button>';
  pag.innerHTML=h;
}
function goPage(p){curPage=p;renderTable();}

function deleteRow(date,dept,product,type){
  if(!confirm('確定要刪除？\n'+date+' | '+dept+' | '+product+' | '+type))return;
  USER_DATA=USER_DATA.filter(function(r){return !(r.date===date&&r.dept===dept&&r.product===product&&r.type===type);});
  saveUD();fillMonthSelects();renderTable();renderOverview();
  toast('已刪除','ok');
}

function resetFilters(){
  ['f-month','f-dept','f-store','f-product','f-type'].forEach(function(id){document.getElementById(id).value='';});
  fillProductSelect('f-product','');curPage=1;renderTable();
}

function saveRecord(){
  var date=document.getElementById('add-date').value;
  var dept=document.getElementById('add-dept').value;
  var product=document.getElementById('add-product').value;
  if(!date||!dept||!product){toast('請填寫日期、部門與品項','err');return;}
  var added=0;
  TYPES.forEach(function(type){
    STORES.forEach(function(store){
      var v=parseFloat(document.getElementById('a-'+type+'-'+store).value);
      if(!isNaN(v)&&v>=0){
        USER_DATA=USER_DATA.filter(function(r){return !(r.date===date&&r.dept===dept&&r.product===product&&r.type===type&&r.store===store);});
        USER_DATA.push({date:date,dept:dept,product:product,type:type,store:store,value:v,_new:true});
        added++;
      }
    });
  });
  if(!added){toast('請至少填寫一筆數量','err');return;}
  saveUD();fillMonthSelects();renderOverview();renderTable();
  toast('已儲存 '+added+' 筆','ok');
}

function clearAddForm(){
  document.getElementById('add-dept').value='';
  document.getElementById('add-product').innerHTML='<option value="">先選部門</option>';
  TYPES.forEach(function(t){STORES.forEach(function(s){document.getElementById('a-'+t+'-'+s).value='';});});
}

function toggleBatch(){
  var sec=document.getElementById('batch-section');
  var btn=document.getElementById('batch-toggle-btn');
  if(sec.style.display==='none'){sec.style.display='block';btn.textContent='收起';renderBatchCal();}
  else{sec.style.display='none';btn.textContent='展開';}
}

function renderBatchCal(){
  var year=document.getElementById('b-year').value;
  var month=document.getElementById('b-month').value;
  var dept=document.getElementById('b-dept').value;
  var product=document.getElementById('b-product').value;
  var cal=document.getElementById('batch-calendar');
  if(!dept||!product){cal.innerHTML='<div class="text-muted text-sm" style="padding:10px">請先選擇部門與品項</div>';return;}
  var days=new Date(parseInt(year),parseInt(month),0).getDate();
  var dn=['日','一','二','三','四','五','六'];
  var html='<div class="tw"><table style="min-width:500px"><thead><tr><th>日期</th>';
  STORES.forEach(function(s){html+='<th style="color:var(--'+s+')">'+s+'</th>';});
  html+='</tr></thead><tbody>';
  for(var d=1;d<=days;d++){
    var ds=year+'-'+month+'-'+(d<10?'0':'')+d;
    html+='<tr><td>'+ds+'（'+dn[new Date(ds).getDay()]+'）</td>';
    STORES.forEach(function(s){html+='<td><input type="number" style="width:60px;text-align:center" id="bc-'+ds+'-'+s+'" placeholder="—" min="0"></td>';});
    html+='</tr>';
  }
  html+='</tbody></table></div>';
  cal.innerHTML=html;
}

function saveBatch(){
  var year=document.getElementById('b-year').value;
  var month=document.getElementById('b-month').value;
  var dept=document.getElementById('b-dept').value;
  var product=document.getElementById('b-product').value;
  var type=document.getElementById('b-type').value;
  if(!dept||!product){toast('請選擇部門與品項','err');return;}
  var days=new Date(parseInt(year),parseInt(month),0).getDate();
  var added=0;
  for(var d=1;d<=days;d++){
    var ds=year+'-'+month+'-'+(d<10?'0':'')+d;
    STORES.forEach(function(s){
      var el=document.getElementById('bc-'+ds+'-'+s);
      if(!el)return;
      var v=parseFloat(el.value);
      if(!isNaN(v)&&v>=0){
        USER_DATA=USER_DATA.filter(function(r){return !(r.date===ds&&r.dept===dept&&r.product===product&&r.type===type&&r.store===s);});
        USER_DATA.push({date:ds,dept:dept,product:product,type:type,store:s,value:v,_new:true});
        added++;
      }
    });
  }
  if(!added){toast('沒有填入任何數量','err');return;}
  saveUD();fillMonthSelects();renderOverview();renderTable();
  toast('批次儲存 '+added+' 筆','ok');
}

function renderManage(){
  renderProdTags('烘焙');renderProdTags('甜點');
  document.getElementById('storage-info').innerHTML=
    '📦 歷史資料（內嵌）：'+BASE_DATA.length.toLocaleString()+' 筆　✏️ 本機新增：'+USER_DATA.length.toLocaleString()+' 筆　合計：'+allData().length.toLocaleString()+' 筆<br>'+
    '<span style="color:var(--bake);font-size:11px">⚠️ 新增資料儲存於此瀏覽器，建議定期備份 JSON 以免資料遺失。</span>';
}

function renderProdTags(dept){
  var def=dept==='烘焙'?DEFAULT_BAKE:DEFAULT_DESSERT;
  var isDef={};def.forEach(function(p){isDef[p]=true;});
  document.getElementById(dept==='烘焙'?'bake-tags':'dessert-tags').innerHTML=
    PRODUCTS[dept].slice().sort().map(function(p){
      return '<span class="tag'+(isDef[p]?'':' tag-new')+'">'+p+'<span class="tag-del" onclick="removeProduct(\''+dept+'\',\''+p+'\')">×</span></span>';
    }).join('');
  document.getElementById(dept==='烘焙'?'bake-count':'dessert-count').textContent=PRODUCTS[dept].length+' 項';
}

function addProduct(dept){
  var input=document.getElementById(dept==='烘焙'?'new-bake':'new-dessert');
  var name=input.value.trim();
  if(!name){toast('請輸入品項名稱','err');return;}
  if(PRODUCTS[dept].indexOf(name)>=0){toast('此品項已存在','err');return;}
  PRODUCTS[dept].push(name);
  saveProd();renderProdTags(dept);
  fillProductSelect('f-product',document.getElementById('f-dept').value);
  fillProductSelect('add-product',document.getElementById('add-dept').value);
  fillProductSelect('b-product',document.getElementById('b-dept').value);
  input.value='';
  toast('已新增「'+name+'」','ok');
}

function removeProduct(dept,name){
  var isDef=(dept==='烘焙'?DEFAULT_BAKE:DEFAULT_DESSERT).indexOf(name)>=0;
  if(!confirm((isDef?'「'+name+'」是預設品項，':'')+'確定要移除？'))return;
  PRODUCTS[dept]=PRODUCTS[dept].filter(function(p){return p!==name;});
  saveProd();renderProdTags(dept);
  fillProductSelect('f-product',document.getElementById('f-dept').value);
  fillProductSelect('add-product',document.getElementById('add-dept').value);
  toast('已移除「'+name+'」','ok');
}

function exportBackup(){
  var bk={version:1,at:new Date().toISOString(),records:USER_DATA,
    customProducts:{烘焙:PRODUCTS['烘焙'].filter(function(p){return DEFAULT_BAKE.indexOf(p)<0;}),甜點:PRODUCTS['甜點'].filter(function(p){return DEFAULT_DESSERT.indexOf(p)<0;})}};
  dlBlob(JSON.stringify(bk,null,2),'application/json','產量備份_'+new Date().toISOString().slice(0,10)+'.json');
  toast('備份已下載','ok');
}

function importBackup(e){
  var file=e.target.files[0];if(!file)return;
  var fr=new FileReader();
  fr.onload=function(ev){
    try{
      var bk=JSON.parse(ev.target.result);
      if(!bk.records)throw new Error('格式錯誤');
      if(!confirm('匯入 '+bk.records.length+' 筆？'))return;
      var ex={};
      USER_DATA.forEach(function(r){ex[r.date+'|'+r.dept+'|'+r.product+'|'+r.type+'|'+r.store]=1;});
      var added=0;
      bk.records.forEach(function(r){
        var k=r.date+'|'+r.dept+'|'+r.product+'|'+r.type+'|'+r.store;
        if(!ex[k]){var nr=JSON.parse(JSON.stringify(r));nr._new=true;USER_DATA.push(nr);added++;}
      });
      if(bk.customProducts){
        Object.keys(bk.customProducts).forEach(function(d){
          (bk.customProducts[d]||[]).forEach(function(p){if(PRODUCTS[d]&&PRODUCTS[d].indexOf(p)<0)PRODUCTS[d].push(p);});
        });
        saveProd();
      }
      saveUD();fillMonthSelects();renderOverview();renderTable();renderManage();
      toast('匯入完成，新增 '+added+' 筆','ok');
    }catch(err){toast('匯入失敗：'+err.message,'err');}
  };
  fr.readAsText(file);e.target.value='';
}

function exportDetailCSV(){
  var rows=grouped(filtered(document.getElementById('exp-month').value,document.getElementById('exp-dept').value,document.getElementById('exp-store').value,'',document.getElementById('exp-type').value));
  if(!rows.length){toast('沒有資料','err');return;}
  var lines=['日期,部門,品項,類型,WX,FJ,SJ,DZ,合計'];
  rows.forEach(function(r){var t=(r.WX||0)+(r.FJ||0)+(r.SJ||0)+(r.DZ||0);lines.push([r.date,r.dept,r.product,r.type,r.WX!=null?r.WX:'',r.FJ!=null?r.FJ:'',r.SJ!=null?r.SJ:'',r.DZ!=null?r.DZ:'',t].join(','));});
  dlCSV(lines,'產量明細');
}

function exportSummaryCSV(){
  var recs=filtered(document.getElementById('exp-month').value,document.getElementById('exp-dept').value,document.getElementById('exp-store').value,'','實際產量');
  var ps={};recs.forEach(function(r){ps[r.product]=1;});
  var prods=Object.keys(ps).sort();
  var lines=['部門,品項,WX,FJ,SJ,DZ,合計'];
  prods.forEach(function(p){
    var pr=recs.filter(function(r){return r.product===p;});
    var s=sumByStore(pr);var t=STORES.reduce(function(a,st){return a+s[st];},0);
    lines.push([(pr[0]?pr[0].dept:''),p,s.WX,s.FJ,s.SJ,s.DZ,t].join(','));
  });
  dlCSV(lines,'月報彙整');
}

function exportCurrentCSV(){
  var rows=grouped(filtered(document.getElementById('f-month').value,document.getElementById('f-dept').value,document.getElementById('f-store').value,document.getElementById('f-product').value,document.getElementById('f-type').value));
  if(!rows.length){toast('沒有資料','err');return;}
  var lines=['日期,部門,品項,類型,WX,FJ,SJ,DZ,合計'];
  rows.forEach(function(r){var t=(r.WX||0)+(r.FJ||0)+(r.SJ||0)+(r.DZ||0);lines.push([r.date,r.dept,r.product,r.type,r.WX!=null?r.WX:'',r.FJ!=null?r.FJ:'',r.SJ!=null?r.SJ:'',r.DZ!=null?r.DZ:'',t].join(','));});
  dlCSV(lines,'產量紀錄');
}

function renderSummaryPreview(){
  var month=document.getElementById('prev-month').value;
  var dept=document.getElementById('prev-dept').value;
  var recs=filtered(month,dept,'','','實際產量');
  var wrap=document.getElementById('summary-preview');
  if(!recs.length){wrap.innerHTML='<div class="empty"><div class="ei">📋</div><div>選擇月份後顯示</div></div>';return;}
  var ps={};recs.forEach(function(r){ps[r.product]=1;});
  var prods=Object.keys(ps).sort();
  var h='<table><thead><tr><th>部門</th><th>品項</th><th>WX</th><th>FJ</th><th>SJ</th><th>DZ</th><th>合計</th></tr></thead><tbody>';
  prods.forEach(function(p){
    var pr=recs.filter(function(r){return r.product===p;});
    var d=pr[0]?pr[0].dept:'';var s=sumByStore(pr);var t=STORES.reduce(function(a,st){return a+s[st];},0);
    h+='<tr><td><span class="badge b-'+(d==='烘焙'?'bake':'dessert')+'">'+d+'</span></td><td>'+p+'</td><td>'+(s.WX||0)+'</td><td>'+(s.FJ||0)+'</td><td>'+(s.SJ||0)+'</td><td>'+(s.DZ||0)+'</td><td><strong>'+t+'</strong></td></tr>';
  });
  wrap.innerHTML=h+'</tbody></table>';
}

function dlCSV(lines,name){
  dlBlob('\uFEFF'+lines.join('\n'),'text/csv;charset=utf-8',name+'_'+new Date().toISOString().slice(0,10)+'.csv');
  toast('已匯出 '+(lines.length-1)+' 筆','ok');
}
function dlBlob(content,type,filename){
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:type}));
  a.download=filename;a.click();
}

var toastTimer=null;
function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(type||'')+' show';
  clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.className='toast';},2800);
}

init();
</script>
